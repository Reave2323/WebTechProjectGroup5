<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="keywords"
      content="shop, buisness, fakeshop, apply, job-listing"

    <link rel="stylesheet" href="./style/style.css" />
  </head>

  <body>

      <div class="nav-container">

            <li><a href="about.html">About</a></li>
            <li><a href="apply.html">Apply Now</a></li>
          </ul>
        </nav>
        <div class="nav-actions">
          <a href="#" class="search">🔍</a>
        </div>
      </div>
    </header>

    <div class="content-area">
      <form
        action="http://mercury.swin.edu.au/it000000/formtest.php"
        method="post"
      >
        <div class="Kbal">
          <h1 id="JobApplication">
            <strong>Official Employment Application</strong>
          </h1>
        </div>

        <fieldset>
          <h2>Position Applied</h2>
          <p>
            <label for="Reference number" class="Labeling"
              >Job Reference Number</label
            >
            <input
              type="text"
              id="Reference_number"
              name="Referenc Number"
              pattern="[0-9]{5}"
              placeholder="Enter Reference Number"
              required="required"
            />
          </p>
        </fieldset>

        <fieldset>
          <!---general users-information-->

          <h2>Personal Information</h2>

          <p>
            <label for="FirstName" class="Labeling">First Name</label>
            <input
              type="text"
              id="FirstName"
              name="First_Name"
              maxlength="20"
              pattern="[A-Za-z ]+"
              placeholder="Enter First Name"
              required="required"
            />
            <label for="LastName">Last Name</label>
            <input
              type="text"
              id="LastName"
              name="Last_Name"
              maxlength="20"
              pattern="[A-Za-z ]+"
              placeholder="Enter Last Name"
              required="required"
            />
          </p>
          <p>
            <label for="DateOfBirth">Date Of Birth</label>
            <input
              type="text"
              id="Date_Of_Birth"
              name="DateOfBirth"
              pattern="\d{2}/\d{2}/\d{4}"
              placeholder="dd/mm/yyyy"
              required="required"
            />
          </p>
        </fieldset>
        <fieldset>
          <!---Gender-->
          <h2>Gender</h2>
          <legend>Gender</legend>
          <label for="Male">M</label>
          <input
            type="radio"
            id="male"
            name="Gender"
            value="male"
            required="required"
          />
          <label for="Female">F</label>
          <input type="radio" id="Female" name="Gender" value="Female" />

          <label for="Other">Other</label>
          <input type="radio" id="Other_gender" name="Gender" value="Other" />
        </fieldset>

        <fieldset>
          <!---Address-->
          <h2>Address</h2>
          <p>
            <label for="Street">Street Address</label>
            <input
              type="text"
              id="Street"
              name="Address[]"
              placeholder="Enter your street"
              pattern="[a-zA-Z0-9\s.,-]{5,40}"
              maxlength="40"
              required="required"
            />
          </p>
          <p>
            <label for="Suburb/Town">Suburb/Town</label>
            <input
              type="text"
              id="Suburb/Town"
              name="Address[]"
              placeholder="Enter your Suburb/Town"
              pattern="[a-zA-Z0-9\s.,-]{5,40}"
              maxlength="40"
              required="required"
            />
          </p>

          <p>
            <label for="State">State</label>
            <select id="States" name="State" required>
              <option value="">Select a State</option>
              <option value="VIC">VIC</option>
              <option value="NSW">NSW</option>
              <option value="QLD">QLD</option>
              <option value="NT">NT</option>
              <option value="WA">WA</option>
              <option value="SA">SA</option>
              <option value="TAS">TAS</option>
              <option value="ACT">ACT</option>
            </select>
          </p>
          <p>
            <label for="Postcode">Post Code</label>
            <input
              type="text"
              id="Postcode"
              name="Address[]"
              placeholder="Enter your postcode"
              pattern="[0-9]{4}"
              required
            />
          </p>
        </fieldset>

        <fieldset>
          <!---USER EMAIL-->
          <h2 class="personal_contact">Personal Contact</h2>
          <legend>Email</legend>
          <p>
            <label for="Email">Email</label>
            <input
              type="text"
              placeholder="Enter your email"
              id="Email"
              name="Email_address"
              pattern="[^@]+@[^@]+.[a-zA-Z]{2,6}"
              required
            />
          </p>
          <p>
            <label for="PhoneNumber">Phnone Number</label>
            <input
              type="text"
              placeholder="Enter your phone number"
              id="PhoneNumber"
              name="Phone_number"
              pattern="[0-9]{8,12}"
              required
            />
          </p>
        </fieldset>
        <fieldset>
          <legend>Skills</legend>

          <p>
            <!--Codeing skills (make drop down for those who click yes)-->
            <label for="HTML_exp">HTML</label>
            <input type="checkbox" id="Html_exp" value="HTML" name="Skills[]" />
            <label for="JIRA_exp">JIRA</label>
            <input type="checkbox" id="JIRA_exp" value="JIRA" name="Skills[]" />
            <label for="CSS_exp">CSS</label>
            <input type="checkbox" id="CSS_exp" name="Skills[]" value="CSS" />
            <label for="Javascript_exp">Javascript</label>
            <input
              type="checkbox"
              name="Skills[]"
              id="Javascript_exp"
              value="Javascript"
            />
            <label for="PHP_exp">PHP</label>
            <input type="checkbox" id="PHP_exp" name="Skills[]" value="PHP" />
            <label for="MySQL_exp">MySQL</label>
            <input
              type="checkbox"
              name="Skills[]"
              id="MySQL_exp"
              value="MySQL"
            />
          </p>
          <p>
            <!---Communication Skills or smth idk-->
            <label for="Communication">Communication Skills</label>
            <input
              type="checkbox"
              name="Skills[]"
              id="Communication"
              value="Communication"
            />
            <label for="ProblemSolvingSkills">Problem Solving Skills</label>
            <input
              type="checkbox"
              name="Skills[]"
              id="ProblemSolvingSkills"
              value="ProblemSolvingSkills"
            />
          </p>
        </fieldset>
        <fieldset>
          <legend>Other skills</legend>
          <textarea
            placeholder="Describe your other skills"
            id="Other_skills"
            name="Other skills"
            rows="3"
            cols="40"
          ></textarea>
        </fieldset>

        <input type="submit" value="Apply" />
        <input type="Reset" value="Reset Application" />
      </form>
    </div>
