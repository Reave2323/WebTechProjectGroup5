    <h1 id="JobApplication"><strong>Employment Application</strong></h1>

   

    
    <form>
        <fieldset> <!---general users-information-->
            <img id="FormLogo" src="/images/FakeShop_logo.png" width="100" height="100">
            <p>
            <label for="Reference number">Job Reference Number</label>
            <input type="text" id="Reference number" Placeholder="Enter Reference Number">
            </p>
            <p>
            <label for="FirstName">First Name</label>
            <input type="text" id="FirstName" placeholder="Enter First Name"
            <label for="LastName">Last Name</label>
            <input type="text" id="LastName" placeholder="Enter Last Name">
            </p>
            <p>
            <label for="DateOfBirth">Date Of Birth</label>
            <input type="date" placeholder="dd/mm/yyyy">
            </p>
            
        </fieldset>
        <fieldset>
            <label for="Gender">Gender</label>
            <br>
            <label for="Male">M</label>
            <input type="radio" id="male" value="male">
            <label for="Female">F</label>
            <input type="radio" id="Female" value="Female">
        </fieldset>


    </form>
